name: One-off import (local dump -> cloud)

# Manual, one-time. Loads stories_dump.json into the cloud DB, skipping any
# cluster whose representative URL already exists (no wipe, no duplicates).
# Uses the DATABASE_URL secret — credentials never leave GitHub.
# Delete this workflow + the dump after running.
on:
  workflow_dispatch: {}

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SYNC_DATABASE_URL: ${{ secrets.SYNC_DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_ENV: import
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Load dump into cloud (deduped by URL)
        run: python -m scripts.db_transfer load stories_dump.json
