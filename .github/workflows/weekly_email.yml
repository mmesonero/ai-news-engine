name: Weekly email digest

# Sends the weekly email AND a ready-to-paste LinkedIn draft (to Telegram), Sunday
# morning. Read-only against the DB — no migrations, no OpenAI. Single shot.
on:
  schedule:
    - cron: "47 6 * * 0"   # Sun 06:47 UTC ≈ 08:47 Spain (summer). Weekend morning = low load.
  workflow_dispatch: {}

concurrency:
  group: weekly-email
  cancel-in-progress: false

# Read-only against the DB and no git push, so the default token needs no write scope.
permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PUBLIC_SITE_BASE: ${{ vars.PUBLIC_SITE_BASE || 'https://mmesonero.github.io/ai-news' }}
      # Used only to translate the LinkedIn draft to Spanish (gpt-4o-mini). Email needs no LLM.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Brevo (public newsletter). If both set, the digest is sent as a Brevo campaign
      # to the list; otherwise it falls back to the SMTP vars below (private send).
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      # Telegram: the weekly LinkedIn draft is sent here for you to approve + paste.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LINKEDIN_DRAFT_CHAT_ID: ${{ secrets.LINKEDIN_DRAFT_CHAT_ID }}
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install project (hash-pinned, reproducible)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt
          pip install -e . --no-deps
      - name: Send weekly digest
        run: python -m app.notify.email_digest
      - name: Send weekly LinkedIn draft to Telegram
        if: always()   # email + draft are independent; one failing shouldn't skip the other
        run: python -m app.notify.linkedin_draft weekly
