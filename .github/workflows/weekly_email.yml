name: Weekly email digest

# Sends one email with the week's top stories, Sunday morning. Read-only against
# the DB — no migrations, no OpenAI. Single shot (no backup) so it never duplicates.
on:
  schedule:
    - cron: "47 6 * * 0"   # Sun 06:47 UTC ≈ 08:47 Spain (summer). Weekend morning = low load.
  workflow_dispatch: {}

concurrency:
  group: weekly-email
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PUBLIC_SITE_BASE: ${{ vars.PUBLIC_SITE_BASE || 'https://mmesonero.github.io/ai-news' }}
      # Brevo (public newsletter). If both set, the digest is sent as a Brevo campaign
      # to the list; otherwise it falls back to the SMTP vars below (private send).
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Send weekly digest
        run: python -m app.notify.email_digest
