name: Daily AI news pipeline

# Runs the ingest → dedup → classify → enrich → Telegram pipeline once a day
# in the cloud (no PC needed). Uses a managed Postgres (Supabase/Neon) via the
# DATABASE_URL secret, OpenAI for transcription/LLM, and Telegram for delivery.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   OPENAI_API_KEY       — OpenAI key
#   DATABASE_URL         — Supabase/Neon async URL: postgresql+asyncpg://user:pass@host:5432/db
#   SYNC_DATABASE_URL    — same DB, sync driver: postgresql+psycopg2://user:pass@host:5432/db
#   TELEGRAM_BOT_TOKEN   — @BotFather token
#   TELEGRAM_CHAT_ID     — your chat id
#
# The managed DB must have the pgvector extension enabled once:
#   CREATE EXTENSION IF NOT EXISTS vector;

on:
  schedule:
    # GitHub cron is UTC, no DST, and BEST-EFFORT (delayed under load — worst at :00
    # and during US-daytime peak). Mitigation: odd minutes (dodge the top-of-hour
    # stampede), schedule EARLY (cron never fires early, only late), and TWO shots per
    # window — a primary + a backup. Safe to double-fire: the pipeline is idempotent and
    # only sends NOT-yet-notified stories, so the backup shot pings nothing if the
    # primary already ran. Times target Spain SUMMER (UTC+2); winter = 1h earlier local.
    #
    # Morning briefing (~06:00 ES) — ESSENTIAL. Early UTC = low Actions load → punctual.
    - cron: "47 2 * * *"    # 02:47 UTC ≈ 04:47 ES — primary
    - cron: "17 3 * * *"    # 03:17 UTC ≈ 05:17 ES — backup
    # Afternoon briefing (~17:00 ES) — 15:00 UTC is US-daytime peak, expect some drift.
    - cron: "37 14 * * *"   # 14:37 UTC ≈ 16:37 ES — primary
    - cron: "23 15 * * *"   # 15:23 UTC ≈ 17:23 ES — backup
  workflow_dispatch: {}     # allow manual runs from the Actions tab

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

# Least privilege: the cross-repo publish uses PAGES_TOKEN (a PAT), so the default
# GITHUB_TOKEN needs no write scope here.
permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SYNC_DATABASE_URL: ${{ secrets.SYNC_DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Optional: where LinkedIn breaking DRAFTS go (your DM). Falls back to the chat above.
      LINKEDIN_DRAFT_CHAT_ID: ${{ secrets.LINKEDIN_DRAFT_CHAT_ID }}
      # Video/audio transcription is OFF: all sources are text RSS now (YouTube
      # sources were dropped to cut token spend). To re-enable, add a youtube
      # source, set TRANSCRIBE_BACKEND=openai + OPENAI_TRANSCRIBE_MODEL, and
      # restore the "Install ffmpeg" step below.
      TRANSCRIBE_BACKEND: none
      RETENTION_DAYS: "14"   # dedup only needs 14d of history; keeps Neon free tier comfortable
      # Read the same way as weekly_email.yml so detail-page / Telegram / LinkedIn link
      # bases never diverge (falls back to the code default if the repo var is unset).
      PUBLIC_SITE_BASE: ${{ vars.PUBLIC_SITE_BASE || 'https://mmesonero.github.io/ai-news' }}
      APP_ENV: prod
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      # No ffmpeg step: transcription is off (TRANSCRIBE_BACKEND=none above).
      # Re-add `sudo apt-get update && sudo apt-get install -y ffmpeg` here if a
      # youtube source ever comes back.
      - name: Install project (hash-pinned, reproducible)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt
          pip install -e . --no-deps

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed source catalog (idempotent)
        run: python -m app.seeds.sources

      - name: Run daily pipeline
        run: python -m app.pipeline.daily

      - name: Retention cleanup (delete content older than RETENTION_DAYS)
        run: python -c "import asyncio; from app.pipeline.retention import run_retention; print(asyncio.run(run_retention()))"

      - name: Publish static news page to portfolio (mmesonero.github.io/ai-news)
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          if [ -z "$PAGES_TOKEN" ]; then
            echo "PAGES_TOKEN not set — skipping static page publish."
            exit 0
          fi
          python -m app.export.static_site site/index.html
          git clone --depth 1 "https://x-access-token:${PAGES_TOKEN}@github.com/mmesonero/mmesonero.github.io.git" out
          # Engine owns the DATA (data.js) + per-story detail pages (n/).
          # index.html is managed by the portfolio repo — never overwrite it.
          rm -rf out/ai-news/n
          mkdir -p out/ai-news/n
          cp -r site/n/. out/ai-news/n/
          cp site/data.js out/ai-news/data.js
          cp site/data-archive.js out/ai-news/data-archive.js
          cd out
          git config user.name "ai-news-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add ai-news
          git commit -m "Update AI news page + detail pages" || { echo "no changes"; exit 0; }
          git push
