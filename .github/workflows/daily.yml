name: Daily AI news pipeline

# Runs the ingest → dedup → classify → enrich → Telegram pipeline once a day
# in the cloud (no PC needed). Uses a managed Postgres (Supabase/Neon) via the
# DATABASE_URL secret, OpenAI for transcription/LLM, and Telegram for delivery.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   OPENAI_API_KEY       — OpenAI key
#   DATABASE_URL         — Supabase/Neon async URL: postgresql+asyncpg://user:pass@host:5432/db
#   SYNC_DATABASE_URL    — same DB, sync driver: postgresql+psycopg2://user:pass@host:5432/db
#   TELEGRAM_BOT_TOKEN   — @BotFather token
#   TELEGRAM_CHAT_ID     — your chat id
#
# The managed DB must have the pgvector extension enabled once:
#   CREATE EXTENSION IF NOT EXISTS vector;

on:
  schedule:
    # GitHub cron is UTC and does NOT follow DST. Times below target Spain SUMMER
    # (CEST, UTC+2). In winter (CET, UTC+1) they fire one hour earlier local.
    - cron: "0 4 * * *"    # 04:00 UTC = 06:00 Spain (summer) — morning briefing
    - cron: "0 15 * * *"   # 15:00 UTC = 17:00 Spain (summer) — afternoon briefing
  workflow_dispatch: {}     # allow manual runs from the Actions tab

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SYNC_DATABASE_URL: ${{ secrets.SYNC_DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TRANSCRIBE_BACKEND: openai
      OPENAI_TRANSCRIBE_MODEL: gpt-4o-transcribe
      RETENTION_DAYS: "14"   # dedup only needs 14d of history; keeps Neon free tier comfortable
      APP_ENV: prod
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (audio for transcription)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed source catalog (idempotent)
        run: python -m app.seeds.sources

      - name: Run daily pipeline
        run: python -m app.pipeline.daily

      - name: Retention cleanup (delete content older than RETENTION_DAYS)
        run: python -c "import asyncio; from app.pipeline.retention import run_retention; print(asyncio.run(run_retention()))"

      - name: Publish static news page to portfolio (mmesonero.github.io/ai-news)
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          if [ -z "$PAGES_TOKEN" ]; then
            echo "PAGES_TOKEN not set — skipping static page publish."
            exit 0
          fi
          python -m app.export.static_site site/index.html
          git clone --depth 1 "https://x-access-token:${PAGES_TOKEN}@github.com/mmesonero/mmesonero.github.io.git" out
          mkdir -p out/ai-news
          cp site/index.html out/ai-news/index.html
          cd out
          git config user.name "ai-news-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add ai-news/index.html
          git commit -m "Update AI news page" || { echo "no changes"; exit 0; }
          git push
