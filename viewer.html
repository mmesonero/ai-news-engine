<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>AI News Viewer</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, Segoe UI, system-ui, sans-serif; background:#0d1117; color:#e6edf3; margin:0; padding:24px; }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:#8b949e; font-size:13px; margin-bottom:20px; }
  .tabs { display:flex; gap:4px; border-bottom:1px solid #30363d; margin-bottom:16px; }
  .tab { padding:8px 16px; cursor:pointer; color:#8b949e; border-bottom:2px solid transparent; }
  .tab.active { color:#e6edf3; border-bottom-color:#58a6ff; }
  .controls { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  button, select, input { background:#21262d; color:#e6edf3; border:1px solid #30363d; border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; }
  button:hover { background:#30363d; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:14px 16px; margin-bottom:10px; }
  .card a { color:#58a6ff; text-decoration:none; font-weight:600; font-size:15px; }
  .card a:hover { text-decoration:underline; }
  .meta { color:#8b949e; font-size:12px; margin-top:6px; display:flex; gap:12px; flex-wrap:wrap; }
  .badge { background:#1f6feb33; color:#79c0ff; padding:2px 8px; border-radius:10px; font-size:11px; }
  .badge.noise { background:#f8514933; color:#ff7b72; }
  .badge.clustered { background:#3fb95033; color:#7ee787; }
  .badge.score { background:#bc8cff33; color:#d2a8ff; font-weight:600; }
  #status { color:#8b949e; font-size:13px; }
  #stats { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:13px; color:#8b949e; }
  #stats b { color:#e6edf3; }
  .scores { display:flex; gap:14px; margin-top:8px; font-size:12px; }
  .score-item { color:#8b949e; }
  .score-item b { color:#e6edf3; font-size:14px; }
  .bar { display:inline-block; width:60px; height:6px; background:#30363d; border-radius:3px; vertical-align:middle; margin-left:6px; position:relative; overflow:hidden; }
  .bar-fill { position:absolute; left:0; top:0; bottom:0; background:#58a6ff; }
  .summary { color:#c9d1d9; font-size:13px; margin-top:8px; line-height:1.5; }
  .topic-tag { background:#21262d; color:#8b949e; padding:2px 8px; border-radius:4px; font-size:11px; margin-right:4px; }
  details summary { cursor:pointer; color:#58a6ff; font-size:13px; margin-top:8px; }
  .hooks { margin-top:8px; padding-left:18px; font-size:13px; color:#c9d1d9; }
  .hooks li { margin-bottom:4px; }
  .members { margin-top:10px; padding-left:14px; border-left:2px solid #30363d; }
  .members a { font-size:13px; color:#58a6ff; display:block; padding:3px 0; }
</style>
</head>
<body>
<h1>AI News Engine — Viewer</h1>
<div class="sub">Local feed at http://localhost:8000</div>

<div id="stats">cargando stats…</div>

<div class="tabs">
  <div class="tab active" data-tab="ranking">Ranking</div>
  <div class="tab" data-tab="news">Noticias</div>
  <div class="tab" data-tab="briefing">Briefing</div>
</div>

<div class="controls">
  <button onclick="loadAll()">Recargar</button>
  <select id="rank-sort" style="display:none">
    <option value="relevance">Relevancia (imp + cobertura)</option>
    <option value="importance">Importancia</option>
    <option value="novelty">Novedad</option>
    <option value="linkedin">LinkedIn</option>
    <option value="business">Impacto negocio</option>
    <option value="members">Tamaño cluster</option>
  </select>
  <select id="rank-period" style="display:none">
    <option value="0">Sin límite</option>
    <option value="24">Últimas 24h</option>
    <option value="48">Últimas 48h</option>
    <option value="168" selected>Últimos 7 días</option>
    <option value="720">Últimos 30 días</option>
  </select>
  <select id="news-filter" style="display:none">
    <option value="clean">Limpias (procesadas, sin ruido, sin duplicados)</option>
    <option value="recent">Últimas 24h</option>
    <option value="unprocessed">Solo sin procesar</option>
    <option value="all">Todas</option>
  </select>
  <select id="brief-hours" style="display:none">
    <option value="24">Últimas 24h</option>
    <option value="48">Últimas 48h</option>
    <option value="72">Últimas 72h</option>
    <option value="168" selected>Últimos 7 días</option>
  </select>
  <select id="brief-tier" style="display:none">
    <option value="baja">Importancia mínima: baja</option>
    <option value="media">Importancia mínima: media</option>
    <option value="alta">Importancia mínima: alta</option>
  </select>
  <label id="imp-wrap" style="display:none;color:#8b949e;font-size:13px">Importancia ≥ <input id="min-imp" type="range" min="0" max="100" value="0" style="vertical-align:middle"> <span id="imp-val">0</span></label>
  <input id="search" placeholder="filtro título…" oninput="render()">
  <span id="status"></span>
</div>

<div id="list"></div>

<script>
const API = 'http://localhost:8000/api/v1';
let news = [];
let clusters = [];
let briefing = null;
let sourcesById = {};
let activeTab = 'ranking';

const THEME_ICON = {
  nuevo_modelo: 'NM', herramienta_nueva: 'HN', nueva_funcionalidad: 'NF',
  movimiento_empresarial: 'ME', caso_practico: 'CP', insight_negocio: 'IN',
  ejemplo_uso: 'EU', noticia_relevante: 'NR',
};
const TIER_COLOR = { alta: '#ff7b72', media: '#d29922', baja: '#8b949e' };

// Escape untrusted text (article titles, LLM summaries/topics/insights) before
// injecting via innerHTML — these originate from fetched articles + the LLM.
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escAttr(s) { return esc(s); }

async function loadAll() {
  document.getElementById('status').textContent = 'cargando…';
  try {
    const [statsR, srcR] = await Promise.all([fetch(API + '/stats'), fetch(API + '/sources')]);
    const stats = await statsR.json();
    const sources = await srcR.json();
    sourcesById = {};
    (sources.items || sources).forEach(s => sourcesById[s.id] = s);
    document.getElementById('stats').innerHTML =
      `<b>${stats.raw_content_total}</b> noticias · <b>${stats.raw_content_last_24h}</b> últimas 24h · <b>${stats.unique_news}</b> únicas · <b>${stats.duplicates}</b> duplicadas · <b>${stats.noise_total}</b> ruido (${(stats.noise_rate*100).toFixed(0)}%) · <b>${stats.clusters_total}</b> clusters · <b>${stats.sources_active}</b> fuentes`;

    // news (paginated)
    news = [];
    let cursor = null;
    for (let i = 0; i < 10; i++) {
      const url = API + '/news?limit=100' + (cursor ? '&cursor=' + encodeURIComponent(cursor) : '');
      const page = await (await fetch(url)).json();
      news.push(...(page.items || []));
      cursor = page.next_cursor;
      if (!cursor) break;
    }

    // clusters list
    const list = await (await fetch(API + '/clusters?limit=100')).json();
    // fetch details in parallel for ranking
    document.getElementById('status').textContent = 'cargando clusters…';
    const details = await Promise.all(list.map(c => fetch(API + '/clusters/' + c.id).then(r => r.json()).catch(() => null)));
    clusters = details.filter(Boolean);

    document.getElementById('status').textContent = `${news.length} noticias · ${clusters.length} clusters`;
    render();
  } catch(e) {
    document.getElementById('status').textContent = 'error: ' + e.message;
  }
}

function distinctSources(c) {
  // count distinct source_id across cluster members
  const ids = new Set((c.members || []).map(m => m.source_id).filter(x => x != null));
  if (ids.size) return ids.size;
  return c.representative ? 1 : 0;
}

function scoreOf(c, key) {
  const p = c.representative?.processed;
  if (!p) return 0;
  if (key === 'importance') return p.importance_score || 0;
  if (key === 'novelty') return p.novelty_score || 0;
  if (key === 'linkedin') return p.linkedin_potential_score || 0;
  if (key === 'business') return p.business_impact_score || 0;
  if (key === 'members') return c.member_count || 0;
  if (key === 'relevance') {
    // composite: importance + cross-source confirmation boost (+8/outlet, cap +20)
    const imp = p.importance_score || 0;
    const boost = Math.min(20, Math.max(0, distinctSources(c) - 1) * 8);
    return imp + boost;
  }
  return 0;
}

function renderRanking() {
  const sortKey = document.getElementById('rank-sort').value;
  const q = document.getElementById('search').value.toLowerCase();
  const periodHours = parseInt(document.getElementById('rank-period').value, 10) || 0;
  const cutoff = periodHours > 0 ? Date.now() - periodHours * 3600 * 1000 : 0;
  let view = clusters.filter(c => {
    if (q) {
      const matchQ = (c.cluster_topic || '').toLowerCase().includes(q) ||
                     (c.representative?.title || '').toLowerCase().includes(q);
      if (!matchQ) return false;
    }
    if (cutoff > 0) {
      const pub = c.representative?.published_at;
      if (!pub || new Date(pub).getTime() < cutoff) return false;
    }
    return true;
  });
  view.sort((a,b) => scoreOf(b, sortKey) - scoreOf(a, sortKey));
  document.getElementById('list').innerHTML = view.map((c, i) => {
    const rep = c.representative || {};
    const p = rep.processed || {};
    const src = sourcesById[rep.source_id]?.name || '?';
    const topics = (p.key_topics || []).map(t => `<span class="topic-tag">${esc(t)}</span>`).join('');
    const insights = p.ai_generated_insights || {};
    const hooks = p.linkedin_angles?.hooks || [];
    const score = (k, label) => {
      const v = scoreOf(c, k);
      return `<span class="score-item">${label} <b>${v}</b><span class="bar"><span class="bar-fill" style="width:${v}%"></span></span></span>`;
    };
    const members = (c.members || []).slice(0, 10).map(m =>
      `<a href="${escAttr(m.url)}" target="_blank">• ${esc(m.title || '(sin título)')}</a>`).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:12px">
        <div style="flex:1">
          <div style="color:#8b949e;font-size:11px;margin-bottom:4px">#${i+1} · cluster ${c.id} · ${c.member_count} ${c.member_count === 1 ? 'item' : 'items'}${(() => { const ds = distinctSources(c); return ds > 1 ? ` · <span style="color:#7ee787">📰 ${ds} fuentes</span>` : ''; })()}</div>
          <div style="color:#e6edf3;font-weight:600;font-size:15px;margin-bottom:6px">${esc(c.cluster_topic || '(sin topic)')}</div>
          <a href="${escAttr(rep.url)}" target="_blank">${esc(rep.title || '')}</a>
          <div class="meta"><span>${esc(src)}</span><span>${new Date(rep.published_at).toLocaleString('es-ES')}</span></div>
        </div>
      </div>
      <div class="scores">
        ${score('importance', 'Imp')}
        ${score('novelty', 'Nov')}
        ${score('linkedin', 'Li')}
        ${score('business', 'Biz')}
      </div>
      ${p.cleaned_summary ? `<div class="summary">${esc(p.cleaned_summary)}</div>` : ''}
      ${topics ? `<div style="margin-top:8px">${topics}</div>` : ''}
      ${insights.executive_summary ? `<details><summary>Insights</summary>
        <div class="summary"><b>Executive:</b> ${esc(insights.executive_summary)}</div>
        ${(insights.business_implications || []).length ? `<div class="summary"><b>Negocio:</b> ${esc(insights.business_implications.join(' · '))}</div>` : ''}
        ${(insights.emerging_trends || []).length ? `<div class="summary"><b>Tendencias:</b> ${esc(insights.emerging_trends.join(' · '))}</div>` : ''}
      </details>` : ''}
      ${hooks.length ? `<details><summary>LinkedIn hooks (${hooks.length})</summary><ul class="hooks">${hooks.map(h => `<li>${esc(h)}</li>`).join('')}</ul></details>` : ''}
      ${members ? `<details><summary>Items del cluster (${c.members?.length || 0})</summary><div class="members">${members}</div></details>` : ''}
    </div>`;
  }).join('') || '<div class="sub">sin resultados</div>';
}

function renderNews() {
  const f = document.getElementById('news-filter').value;
  const q = document.getElementById('search').value.toLowerCase();
  const minImp = parseInt(document.getElementById('min-imp').value, 10) || 0;
  document.getElementById('imp-val').textContent = minImp;
  const cutoff = Date.now() - 24*3600*1000;
  let view = news.filter(it => {
    if (q && !(it.title || '').toLowerCase().includes(q)) return false;
    if (it.processed?.is_noise) return false;
    if (f === 'clean' && !it.processed) return false;
    if (f === 'recent' && new Date(it.published_at).getTime() < cutoff) return false;
    if (f === 'unprocessed' && it.processed) return false;
    if (minImp > 0 && (it.processed?.importance_score || 0) < minImp) return false;
    return true;
  });
  if (f === 'clean' || minImp > 0) {
    view.sort((a,b) => (b.processed?.importance_score || 0) - (a.processed?.importance_score || 0));
  } else {
    view.sort((a,b) => new Date(b.published_at) - new Date(a.published_at));
  }
  document.getElementById('list').innerHTML = view.map(it => {
    const src = sourcesById[it.source_id]?.name || '?';
    const date = new Date(it.published_at).toLocaleString('es-ES');
    const badges = [];
    const imp = it.processed?.importance_score;
    if (imp != null) badges.push(`<span class="badge score">imp ${imp}</span>`);
    if (it.cluster_id) badges.push('<span class="badge clustered">cluster #'+it.cluster_id+'</span>');
    if (!it.processed) badges.push('<span class="badge">sin procesar</span>');
    const summary = it.processed?.cleaned_summary ? `<div class="summary">${esc(it.processed.cleaned_summary)}</div>` : '';
    return `<div class="card">
      <a href="${escAttr(it.url)}" target="_blank">${esc(it.title || '(sin título)')}</a>
      <div class="meta">
        <span>${esc(src)}</span><span>${date}</span><span>${esc(it.author || '')}</span>
        ${badges.join('')}
      </div>
      ${summary}
    </div>`;
  }).join('') || '<div class="sub">sin resultados</div>';
  document.getElementById('status').textContent = `${view.length} de ${news.length} noticias`;
}

async function loadBriefing() {
  const hours = document.getElementById('brief-hours').value;
  const tier = document.getElementById('brief-tier').value;
  document.getElementById('status').textContent = 'cargando briefing…';
  try {
    const r = await fetch(API + `/briefing/daily?hours=${hours}&min_tier=${tier}&per_theme=10`);
    briefing = await r.json();
    document.getElementById('status').textContent = `${briefing.total} noticias en briefing`;
    renderBriefing();
  } catch(e) {
    document.getElementById('status').textContent = 'error: ' + e.message;
  }
}

function renderBriefing() {
  if (!briefing) { document.getElementById('list').innerHTML = '<div class="sub">cargando…</div>'; return; }
  if (!briefing.blocks.length) {
    document.getElementById('list').innerHTML = '<div class="sub">sin noticias en el rango seleccionado</div>';
    return;
  }
  const since = new Date(briefing.since).toLocaleString('es-ES');
  const until = new Date(briefing.until).toLocaleString('es-ES');
  const header = `<div class="sub" style="margin-bottom:14px">${briefing.total} noticias · ${since} → ${until}</div>`;
  document.getElementById('list').innerHTML = header + briefing.blocks.map(block => {
    const items = block.items.map(it => {
      const p = it.processed || {};
      const src = sourcesById[it.source_id]?.name || '?';
      const date = it.published_at ? new Date(it.published_at).toLocaleString('es-ES') : '';
      const tier = p.importance_tier || 'baja';
      const tierBadge = `<span class="badge" style="background:${TIER_COLOR[tier]}33;color:${TIER_COLOR[tier]}">${tier}</span>`;
      const imp = p.importance_score != null ? `<span class="badge score">imp ${p.importance_score}</span>` : '';
      const ds = it.distinct_sources || 1;
      const srcBadge = ds > 1 ? `<span class="badge" style="background:#3fb95033;color:#7ee787">📰 ${ds} fuentes</span>` : '';
      const summary = p.cleaned_summary ? `<div class="summary">${esc(p.cleaned_summary)}</div>` : '';
      return `<div class="card">
        <a href="${escAttr(it.url)}" target="_blank">${esc(it.title || '(sin título)')}</a>
        <div class="meta"><span>${esc(src)}</span><span>${date}</span>${tierBadge}${imp}${srcBadge}</div>
        ${summary}
      </div>`;
    }).join('');
    return `<div style="margin-bottom:24px">
      <h2 style="font-size:16px;color:#e6edf3;border-bottom:1px solid #30363d;padding-bottom:6px;margin-bottom:10px">
        ${esc(block.label)} <span style="color:#8b949e;font-weight:400;font-size:13px">· ${block.items.length}</span>
      </h2>
      ${items}
    </div>`;
  }).join('');
}

function render() {
  document.getElementById('rank-sort').style.display = activeTab === 'ranking' ? '' : 'none';
  document.getElementById('rank-period').style.display = activeTab === 'ranking' ? '' : 'none';
  document.getElementById('news-filter').style.display = activeTab === 'news' ? '' : 'none';
  document.getElementById('imp-wrap').style.display = activeTab === 'news' ? '' : 'none';
  document.getElementById('brief-hours').style.display = activeTab === 'briefing' ? '' : 'none';
  document.getElementById('brief-tier').style.display = activeTab === 'briefing' ? '' : 'none';
  if (activeTab === 'ranking') renderRanking();
  else if (activeTab === 'news') renderNews();
  else if (activeTab === 'briefing') { if (!briefing) loadBriefing(); else renderBriefing(); }
}
document.getElementById('min-imp').addEventListener('input', render);

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  activeTab = t.dataset.tab;
  render();
}));
document.getElementById('rank-sort').addEventListener('change', render);
document.getElementById('rank-period').addEventListener('change', render);
document.getElementById('news-filter').addEventListener('change', render);
document.getElementById('brief-hours').addEventListener('change', loadBriefing);
document.getElementById('brief-tier').addEventListener('change', loadBriefing);

loadAll();
</script>
</body>
</html>
