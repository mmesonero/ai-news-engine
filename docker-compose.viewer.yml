# Read-only viewer for the CLOUD database (Neon).
# Lets you browse the real production news in a local browser, on demand.
#
# Setup once: copy .env.cloud.example -> .env.cloud and paste your Neon URLs.
# Run:  docker compose -f docker-compose.viewer.yml up -d
# Open: http://localhost:8001/viewer
#
# It does NOT run the pipeline (ENABLE_SCHEDULER=false) and does NOT migrate or
# seed — pure read-only view of whatever the cloud cron has collected.
services:
  viewer:
    build: .
    env_file: .env.cloud
    environment:
      ENABLE_SCHEDULER: "false"
      APP_ENV: viewer
      # Not used for viewing, but config tolerates empty.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-unused}
    ports:
      - "127.0.0.1:8001:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
